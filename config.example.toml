[rpc]
# Use a paid low-latency Tokyo BNB Chain endpoint for real runs.
# QuickNode and Alchemy BNB endpoints are both supported. For Alchemy:
# http_url = "https://bnb-mainnet.g.alchemy.com/v2/your-api-key"
# ws_url = "wss://bnb-mainnet.g.alchemy.com/v2/your-api-key"
http_url = "https://bsc-dataseed.bnbchain.org"
ws_url = "wss://your-bnb-ws-endpoint.example"
# Optional: use Alchemy PAYG or another log-friendly provider for historical scans.
# scan_http_url = "https://bnb-mainnet.g.alchemy.com/v2/your-api-key"
chain_id = 56
max_requests_per_second = 15

[wallet]
private_key_env = "SNIPER_PRIVATE_KEY"

[contracts]
# Official 42 Docs deployment addresses checked on 2026-05-26.
controller = "0xF21b2D4F8989b27f732e369907F25f0E8D95Fe62"
router = "0x88888888338e60bfB4657187169cFFa5c8640E42"
collateral = "0x55d398326f99059fF775485246999027B3197955"

[strategy]
outcome_token_id = "1"
buy_amount_units = "10"
collateral_decimals = 18
min_out_or_max_in = "0"
gas_limit = 300000
gas_price_bump_bps = 2000
dry_run = true
wait_for_receipt = false

[latency]
enabled = true
log_path = "logs/latency.jsonl"
# Set to quicknode-discover, quicknode-build, alchemy-payg, etc.
provider_label = "primary"

[pricing]
enabled = true
log_path = "logs/prices.jsonl"
max_sell_slippage_bps = 5000
extra_sell_tax_bps = 0
sample_offsets_ms = [0, 10000, 60000]

[metadata]
enabled = false
rest_base_url = "https://rest.ft.42.space/api/v1"
timeout_ms = 250

[filters]
allowed_collateral = ["0x55d398326f99059fF775485246999027B3197955"]
